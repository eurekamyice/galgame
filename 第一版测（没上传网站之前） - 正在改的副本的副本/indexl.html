<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<!-- UTF-8：网页字符编码，防止中文乱码 -->

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">
<!-- viewport：手机屏幕适配 -->

<title>
青春崆峒男高会梦见属于自己的直男吗?
</title>

<link rel="stylesheet" href="style.css">
<!-- link：连接CSS样式文件 -->

</head>

<body>

<!-- 背景层 -->

<div id="background"></div>

<!-- 梦核白雾 -->

<div id="overlay"></div>

<!-- 首页专属梦核装饰（仅 home 场景显示） -->

<div id="home-fx" hidden aria-hidden="true">

    <div class="home-grain"></div>
    <div class="home-scanlines"></div>
    <div class="home-bloom"></div>

    <div class="home-orb home-orb--a"></div>
    <div class="home-orb home-orb--b"></div>
    <div class="home-orb home-orb--c"></div>

    <span class="home-tag home-tag--tl">DREAM://001</span>
    <span class="home-tag home-tag--tr">04:27 AM</span>
    <span class="home-tag home-tag--bl">MEMORY_LOOP</span>
    <span class="home-tag home-tag--br"><span class="home-rec-dot"></span>REC</span>

    <i class="home-corner home-corner--tl"></i>
    <i class="home-corner home-corner--tr"></i>
    <i class="home-corner home-corner--bl"></i>
    <i class="home-corner home-corner--br"></i>

</div>

<!-- 主容器 -->

<div id="game-container">

    <!-- 文本区域（叠在全屏背景之上） -->

    <div id="story-area">

        <div id="speaker"></div>
        <!-- speaker：角色名字 -->

        <div id="story-text"></div>
        <!-- story-text：剧情文本，点击可翻页 -->

        <div id="author">
            by twjdz
        </div>

    </div>

</div>

<!-- 选项区域 -->

<div id="choices"></div>

<!-- 背景音乐 -->

<audio id="bgm" loop></audio>
<!-- audio：音频播放器 -->
<!-- loop：循环播放 -->

<script src="script.js"></script>
<!-- script：引入JS脚本 -->

</body>

</html>
